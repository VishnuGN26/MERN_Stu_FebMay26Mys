<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text content basics</title>
</head>

<body>
    <h2>FAQ Builder</h2>
    <div>
        <input type="text" id="question" placeholder="Enter question"><br>
        <textarea id="answer" rows="4" placeholder="Enter answer"></textarea><br>
        <button id="addBtn">Add FAQ</button>
        <p id="error"></p>
    </div>
    <h3>FAQs</h3>
    <div id="faqContainer"></div>
    <p id="emptyMessage">No FAQs available</p>
    <script src="./a2.js"></script>
</body>

</html>
